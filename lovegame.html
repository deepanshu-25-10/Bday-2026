<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Meter 3000 📸</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Fredoka', sans-serif; text-align: center; color: #d63031;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px;
            position: relative; z-index: 10;
        }
        
        /* --- PHOTO UPLOAD STYLES --- */
        .photo-wrapper {
            display: flex; justify-content: center; align-items: flex-start; gap: 15px;
            margin: 20px 0;
        }
        .photo-container { display: flex; flex-direction: column; align-items: center; width: 100px; }

        .photo-box {
            width: 100px; height: 100px; border-radius: 50%;
            background: #fff0f0; border: 3px dashed #ff7675;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; overflow: hidden; position: relative;
            transition: transform 0.3s, border-color 0.3s;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-box span { font-size: 2rem; color: #ff7675; }
        
        /* ✨ ULTRA CUSTOMIZED RED SCANNER (SHM + Gradient) ✨ */
        .scan-bar {
            position: absolute; left: 0; width: 100%; height: 10px;
            background: rgb(255,0,0);
            background: linear-gradient(180deg, rgba(255,0,0,0) 0%, rgba(255,0,0,1) 50%, rgba(255,0,0,0) 100%);
            box-shadow: 0 0 15px #ff0000, 0 0 5px #ff0000;
            display: none; z-index: 5;
            top: 0;
        }

        .scanning .scan-bar {
            display: block;
            animation: scanMoveRedSHM 1s ease-in-out infinite; 
        }
        .scanning { border-color: #ff0000 !important; border-style: solid !important; }

        @keyframes scanMoveRedSHM {
            0% { top: -10%; }
            50% { top: 100%; } 
            100% { top: -10%; } 
        }

        .detection-text {
            margin-top: 8px; font-weight: bold; font-size: 0.8rem;
            opacity: 0; transition: opacity 0.5s ease;
            height: 1.2rem; line-height: 1.2rem;
        }
        .detected { opacity: 1; }
        
        #nameRef1 { color: #d63031; } /* Navyaa color */
        #nameRef2 { color: #636e72; } /* Deepanshu color */

        .plus-sign { font-size: 2rem; color: #ff7675; font-weight: bold; margin-top: 30px;}
        input[type="file"] { display: none; }

        .btn {
            background: #ff7675; color: white; border: none; padding: 12px 30px;
            border-radius: 50px; cursor: pointer; font-size: 1.1rem; margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 118, 117, 0.4);
        }
        .btn:hover { background: #d63031; transform: scale(1.05); }

        /* --- RESULT AREA --- */
        #result-box { display: none; margin-top: 20px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #percentage { font-size: 2.5rem; font-weight: bold; margin: 10px 0; word-wrap: break-word; line-height: 1.2; }
        #verdict { font-size: 1.1rem; color: #636e72; margin-bottom: 15px; }

        /* CRASH MODE */
        .crash-mode {
            background: #000 !important; color: #0f0 !important;
            display: block !important; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; text-align: left; overflow-wrap: break-word;
            font-family: 'Courier New', monospace; z-index: 9999; overflow: hidden;
        }
        .crash-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: red; color: white; padding: 20px; border: 5px solid white;
            font-size: 1.5rem; font-weight: bold; text-align: center;
            box-shadow: 0 0 50px red; display: none;
        }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <h2>📸 Love Calculator 📸</h2>
    <p>Upload photos to check compatibility!</p>
    
    <div class="photo-wrapper">
        <div class="photo-container">
            <label class="photo-box" id="box1">
                <div class="scan-bar"></div>
                <input type="file" accept="image/*" onchange="previewImage(this, 'img1', 'box1')">
                <img id="img1">
                <span>👩</span>
            </label>
            <div class="detection-text" id="nameRef1"></div> 
        </div>
        
        <div class="plus-sign">+</div>

        <div class="photo-container">
            <label class="photo-box" id="box2">
                <div class="scan-bar"></div>
                <input type="file" accept="image/*" onchange="previewImage(this, 'img2', 'box2')">
                <img id="img2">
                <span>👨</span>
            </label>
            <div class="detection-text" id="nameRef2"></div> 
        </div>
    </div>
    
    <button class="btn" id="calcBtn" onclick="startIdentification()">Identify & Calculate ✨</button>

    <div id="result-box">
        <div id="percentage">0%</div>
        <p id="verdict"></p>
        <button class="btn" onclick="retryCalculation()" style="background: #6c5ce7; font-size: 0.9rem; margin-top: 10px;">Try Again 🔄</button>
        <button class="btn" onclick="window.location.href='index.html'" style="background: #fab1a0; font-size: 0.9rem; margin-top: 5px;">Home 🏠</button>
    </div>
</div>

<div id="crashMsg" class="crash-overlay">
    ⚠️ SYSTEM CRASHED ⚠️<br>
    <span style="font-size: 1rem; font-weight: normal;">Babe ab or kya chahiye :-(</span><br>
    <button onclick="window.location.reload()" style="margin-top:10px; padding:5px 10px; background:white; color:red; border:none; cursor:pointer;">Restart System</button>
</div>

<script>
    function previewImage(input, imgId, boxId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
                img.nextElementSibling.style.display = 'none'; 
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 🚀 INITIAL 5 SEC SCAN
    function startIdentification() {
        const img1 = document.getElementById('img1').src;
        const img2 = document.getElementById('img2').src;

        if (!img1 || !img2 || img1 === window.location.href || img2 === window.location.href) {
            alert("Please upload both photos first! 📸"); return;
        }

        const btn = document.getElementById('calcBtn');
        const box1 = document.getElementById('box1');
        const box2 = document.getElementById('box2');
        const name1 = document.getElementById('nameRef1');
        const name2 = document.getElementById('nameRef2');

        name1.classList.remove('detected'); name2.classList.remove('detected');

        // Start 5s Scan
        btn.innerText = "Simulating Face ID AI...";
        btn.disabled = true; btn.style.background = "#b2bec3";
        box1.classList.add('scanning'); box2.classList.add('scanning');

        // 2.5s: Reveal Names
        setTimeout(() => {
            name1.innerText = "navyaa babyyy ❤️"; 
            name1.classList.add('detected');
            name2.innerText = "huh deepanshu 😑"; 
            name2.classList.add('detected');
        }, 2500);

        // 5.0s: Finish
        setTimeout(() => {
            box1.classList.remove('scanning'); box2.classList.remove('scanning');
            btn.style.display = 'none'; 
            showTrollResult(); 
        }, 5000); 
    }

    // 🔄 RE-CALCULATE (4 SEC DELAY)
    function retryCalculation() {
        // Hide previous result
        document.getElementById('result-box').style.display = 'none';

        const btn = document.getElementById('calcBtn');
        const box1 = document.getElementById('box1');
        const box2 = document.getElementById('box2');

        // Show Button with "Re-calculating" state
        btn.style.display = 'inline-block';
        btn.innerText = "Re-verifying Logic... 🔄";
        btn.style.background = "#b2bec3";
        
        // Trigger Animation (Red Scan) again
        box1.classList.add('scanning');
        box2.classList.add('scanning');

        // Wait 4 Seconds
        setTimeout(() => {
            box1.classList.remove('scanning');
            box2.classList.remove('scanning');
            btn.style.display = 'none';
            showTrollResult();
        }, 4000);
    }

    function showTrollResult() {
        document.getElementById('result-box').style.display = 'block';
        const percDisplay = document.getElementById('percentage');
        const verdictDisplay = document.getElementById('verdict');
        const scenario = Math.floor(Math.random() * 6);
        percDisplay.style.color = "#d63031"; percDisplay.style.fontSize = "2.5rem";

        if (scenario === 0) {
            percDisplay.innerText = "Error: 404";
            verdictDisplay.innerText = "Still calculating... love is tooo large! 🤯";
        } else if (scenario === 1) {
            percDisplay.innerText = "0%";
            verdictDisplay.innerText = "Nah mate he doesnt 😑";
        } else if (scenario === 2) {
            percDisplay.innerText = "100.000%";
            verdictDisplay.innerText = "Because itni hi meri capability hai dikhane ki 🤷‍♂️";
        } else if (scenario === 3) {
            percDisplay.innerText = "10%";
            verdictDisplay.innerText = "Baki to or kahi ja rha hai malum kro usse kisko ja rha 😑";
        } else if (scenario === 4) {
            percDisplay.style.fontSize = "1.5rem";
            percDisplay.innerText = "9,223,372,036,854,775,807";
            verdictDisplay.innerText = "Capability limit reached (LONG.MAX) 📈";
        } else if (scenario === 5) {
            startCrashSequence();
        }
    }

    function startCrashSequence() {
        const body = document.body;
        const mainCard = document.getElementById('mainCard');
        mainCard.style.display = 'none';
        body.classList.add('crash-mode');
        body.innerHTML = "SYSTEM OVERLOAD...<br>";
        let count = 0;
        const interval = setInterval(() => {
            body.innerHTML += "99.99999999999999 ";
            count++;
            window.scrollTo(0, document.body.scrollHeight);
            if(count > 100) { 
                clearInterval(interval);
                document.getElementById('crashMsg').style.display = 'block';
            }
        }, 50);

        setTimeout(() => {
            const crashDiv = document.createElement('div');
            crashDiv.className = 'crash-overlay';
            crashDiv.style.display = 'block';
            crashDiv.innerHTML = `
                ⚠️ WEBSITE CRASHED ⚠️<br>
                <span style="font-size: 1rem; font-weight: normal; margin-top:10px; display:block;">
                    Babe ab or kya chahiye :-(
                </span>
                <button onclick="window.location.reload()" style="margin-top:15px; padding:8px 20px; border-radius:5px; background:white; color:red; border:none; font-weight:bold; cursor:pointer;">
                    Fix It 🔧
                </button>
            `;
            body.appendChild(crashDiv);
        }, 3000);
    }
</script>

</body>
</html>
