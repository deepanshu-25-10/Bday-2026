<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE TERMINAL // RESTRICTED</title>
    <style>
        /* --- HACKER THEME --- */
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Allows growing */
            margin: 0;
            /* Removed overflow:hidden so page can scroll if terminal gets huge */
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            width: 90%;
            max-width: 500px;
            border: 2px solid #0f0;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            background: rgba(0, 20, 0, 0.9);
            position: relative;
            z-index: 10;
            transition: height 0.3s ease; /* Smooth growth */
        }

        h1 {
            font-size: 1.5rem;
            border-bottom: 1px dashed #0f0;
            padding-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #0f0;
            margin-top: 0;
        }

        .input-group { margin: 20px 0; }
        
        label { display: block; margin-bottom: 5px; opacity: 0.8; }
        
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #0f0;
            color: #0f0;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            padding: 5px;
            box-sizing: border-box; /* Fixes padding width issue */
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #0f0; }

        /* --- UPDATED LOGS SECTION --- */
        .logs {
            margin-top: 20px;
            font-size: 0.9rem;
            /* Removed fixed height and overflow */
            color: #cfc;
            display: none; /* Hidden initially */
        }

        .log-line { margin: 5px 0; word-wrap: break-word; } /* Ensure text wraps */
        .error { color: red; text-shadow: 0 0 5px red; font-weight: bold; }
        .blink { animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="terminal">
        <h1><span class="blink">█</span> SECURE LOGIN</h1>
        
        <div id="loginForm">
            <div class="input-group">
                <label>> ENTER USERNAME:</label>
                <input type="text" id="username" placeholder="_" autocomplete="off">
            </div>
            <div class="input-group">
                <label>> ENTER PASSWORD:</label>
                <input type="password" id="password" placeholder="******">
            </div>
            <button onclick="startHack()">ACCESS MAINFRAME</button>
        </div>

        <div id="console" class="logs"></div>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        const formDiv = document.getElementById('loginForm');

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        async function startHack() {
            const user = document.getElementById('username').value || "UNKNOWN";
            const pass = document.getElementById('password').value;

            if(!pass) { alert("ERROR: PASSWORD REQUIRED"); return; }

            // Hide form, show console
            formDiv.style.display = 'none';
            consoleDiv.style.display = 'block';

            // Fake Loading Sequence
            await log(`> Initializing connection protocol...`, 500);
            await log(`> Target: ${user.toUpperCase()}'s BIRTHDAY VAULT`, 800);
            await log(`> Verifying encryption keys...`, 1200);
            await log(`> Bypassing firewall [||||||||||] 100%`, 1000);
            await log(`> Authenticating credentials...`, 2000);
            await log(`> Accessing secure database...`, 1500);
            
            // THE REJECTION
            await log(`> ERROR: HASH MISMATCH DETECTED.`, 500);
            await log(`> ACCESS DENIED.`, 200, true);
            await log(`> REASON: INCORRECT PASSWORD.`, 200, true);
            await log(`> SYSTEM LOCKDOWN INITIATED.`, 200, true);

            // Add a retry button after failure
            setTimeout(() => {
                consoleDiv.innerHTML += `<br><button onclick="location.reload()" style="background:red; color:white; box-shadow: 0 0 15px red;">TRY AGAIN</button>`;
            }, 1000);
        }

        async function log(text, delay, isError = false) {
            const p = document.createElement('div');
            p.className = 'log-line';
            if(isError) p.className += ' error';
            p.innerText = text;
            consoleDiv.appendChild(p);
            // No need to scroll manually since height is flexible now
            await sleep(delay);
        }
    </script>

</body>
</html>
